name: Notify Teams of New Release

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag_name:
                description: 'Release tag to simulate'
                required: true
                default: 'v2.5.1'
            release_body:
                description: 'Release notes body'
                required: false
                default: 'Manual test run of notify-release workflow'
            release_url:
                description: 'Release HTML URL'
                required: false
                default: 'https://github.com/duckduckgo/native-github-asana-sync/releases/tag/v2.5.1'

env:
    RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
    RELEASE_BODY: ${{ github.event.release.body || inputs.release_body }}
    RELEASE_URL: ${{ github.event.release.html_url || inputs.release_url }}

jobs:
    notify-teams:
        runs-on: ubuntu-latest
        name: Create Asana Tasks for Release Notification

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Android Team
            - name: Create Asana task for Android team
              id: android-task
              uses: ./
              with:
                  asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
                  asana-project: '1209454604567606'
                  asana-section: '1209455675160384'
                  asana-task-name: '🤖 Asana <> Github Integration Update: ${{ env.RELEASE_TAG }}'
                  asana-task-description: |
                      New Asana <> Github Integration release: ${{ env.RELEASE_TAG }}

                      ${{ env.RELEASE_BODY }}

                      Update workflows to: ${{ github.repository }}@${{ env.RELEASE_TAG }}
                      Release notes: ${{ env.RELEASE_URL }}
                  action: 'create-asana-task'

            - name: Verify Android task was created
              run: |
                  TASK_ID="${{ steps.android-task.outputs.taskId }}"
                  if [ -z "$TASK_ID" ] || [ "$TASK_ID" = "0" ]; then
                      echo "::error::Failed to create Asana task for Android team"
                      exit 1
                  fi

            # Add more teams as needed...
            # - name: Create Asana task for [TEAM_NAME] team
            #   uses: duckduckgo/native-github-asana-sync@main
            #   with:
            #     asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
            #     asana-project: ${{ vars.[TEAM]_ASANA_PROJECT_ID }}
            #     asana-section: ${{ vars.[TEAM]_ASANA_SECTION_ID }}
            #     asana-task-name: "📢 Asana <> Github Integration Update: ${{ github.event.release.tag_name }}"
            #     asana-task-description: |
            #         New release: ${{ github.event.release.tag_name }}
            #         ${{ github.event.release.body }}
            #     action: 'create-asana-task'

            - name: Summary
              run: |
                  echo "Created Asana task ${{ steps.android-task.outputs.taskId }} for ${{ env.RELEASE_TAG }}"
                  echo "Release URL: ${{ env.RELEASE_URL }}"
