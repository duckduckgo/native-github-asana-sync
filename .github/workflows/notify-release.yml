name: Notify Teams of New Release

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag_name:
                description: 'Release tag to simulate'
                required: true
                default: 'v2.5.2'
            release_body:
                description: 'Release notes body'
                required: false
                default: 'Manual test run of notify-release workflow'
            release_url:
                description: 'Release HTML URL'
                required: false
                default: 'https://github.com/duckduckgo/native-github-asana-sync/releases/tag/v2.5.2'
            release_name:
                description: 'Release name/title'
                required: false
                default: 'v2.5.2'

env:
    RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
    RELEASE_NAME: ${{ github.event.release.name || github.event.release.tag_name || inputs.tag_name || inputs.release_name }}
    RELEASE_BODY: ${{ github.event.release.body || inputs.release_body }}
    RELEASE_URL: ${{ github.event.release.html_url || inputs.release_url }}

jobs:
    notify-teams:
        runs-on: ubuntu-latest
        name: Create Asana Tasks for Release Notification

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check for breaking release
              id: breaking
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  CURRENT="${{ env.RELEASE_TAG }}"
                  PREVIOUS=$(gh release list --repo "${{ github.repository }}" --limit 10 --json tagName \
                      -q ".[] | select(.tagName != \"$CURRENT\") | .tagName" | head -1)
                  if [ -z "$PREVIOUS" ]; then
                      echo "No previous release found; treating as non-breaking."
                      exit 0
                  fi
                  CURRENT_MAJOR=$(echo "$CURRENT" | sed -E 's/^v?([0-9]+).*/\1/')
                  PREVIOUS_MAJOR=$(echo "$PREVIOUS" | sed -E 's/^v?([0-9]+).*/\1/')
                  if [ "$CURRENT_MAJOR" -gt "$PREVIOUS_MAJOR" ]; then
                      {
                          echo 'warning<<EOF'
                          echo "⚠️ Breaking release (major version bump from ${PREVIOUS} to ${CURRENT}). Review release notes carefully before updating your workflows."
                          echo 'EOF'
                      } >> "$GITHUB_OUTPUT"
                  fi

            # Android Team
            - name: Create Asana task for Android team
              id: android-task
              uses: ./
              with:
                  asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
                  asana-project: ${{ vars.GH_ANDROID_APP_PROJECT_ID }}
                  asana-section: ${{ vars.GH_ANDROID_APP_INCOMING_SECTION_ID }}
                  asana-task-name: '🤖 Asana <> Github Integration Update: ${{ env.RELEASE_NAME }}'
                  asana-task-description: |
                      New Asana <> Github Integration release: ${{ env.RELEASE_NAME }}

                      ${{ steps.breaking.outputs.warning }}

                      Release notes:
                      ${{ env.RELEASE_BODY }}

                      Action required:
                      Update your workflows to use ${{ github.repository }}@${{ env.RELEASE_TAG }}

                      Release: ${{ env.RELEASE_URL }}
                  action: 'create-asana-task'

            - name: Verify Android task was created
              run: |
                  TASK_ID="${{ steps.android-task.outputs.taskId }}"
                  if [ -z "$TASK_ID" ] || [ "$TASK_ID" = "0" ]; then
                      echo "::error::Failed to create Asana task for Android team"
                      exit 1
                  fi

            # Add more teams as needed...
            # - name: Create Asana task for [TEAM_NAME] team
            #   uses: ./
            #   with:
            #     asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
            #     asana-project: ${{ vars.[TEAM]_ASANA_PROJECT_ID }}
            #     asana-section: ${{ vars.[TEAM]_ASANA_INCOMING_SECTION_ID }}
            #     asana-task-name: "📢 Asana <> Github Integration Update: ${{ env.RELEASE_NAME }}"
            #     asana-task-description: |
            #         New Asana <> Github Integration release: ${{ env.RELEASE_NAME }}
            #
            #         ${{ steps.breaking.outputs.warning }}
            #
            #         Release notes:
            #         ${{ env.RELEASE_BODY }}
            #
            #         Action required:
            #         Update your workflows to use ${{ github.repository }}@${{ env.RELEASE_TAG }}
            #
            #         Release: ${{ env.RELEASE_URL }}
            #     action: 'create-asana-task'

            - name: Summary
              run: |
                  echo "Created Asana task ${{ steps.android-task.outputs.taskId }} for ${{ env.RELEASE_NAME }}"
                  echo "Release URL: ${{ env.RELEASE_URL }}"
