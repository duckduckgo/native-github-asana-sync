name: Start Privacy Review
# Note: callers must checkout this repo to `./native-github-asana-sync`
inputs:
    trigger-phrase:
        required: false
        type: string
    team_name:
        required: true
        type: string
    ref:
        required: false
        type: string
    asana_pat:
        required: true
    github_pat:
        required: true

outputs:
    triage_task_id:
        description: 'GID of the Privacy Triage Asana task created by this action.'
        value: ${{ steps.create-review-task.outputs.taskId }}
    triage_task_permalink:
        description: 'Permalink URL of the Privacy Triage Asana task created by this action.'
        value: https://app.asana.com/0/69071770703008/${{ steps.create-review-task.outputs.taskId }}
    original_task_id:
        description: 'GID of the original product task referenced in the PR description (matched via the trigger-phrase regex), or empty if none found.'
        value: ${{ steps.find-asana-task-id.outputs.asanaTaskId }}

runs:
    using: 'composite'
    steps:
        - name: Get PR author Asana ID
          uses: ./native-github-asana-sync
          id: get-author-asana-id
          with:
              action: 'get-asana-user-id'
              github-pat: ${{ inputs.github_pat }}

        - name: Find Asana Task in PR description
          uses: ./native-github-asana-sync
          id: find-asana-task-id
          continue-on-error: true
          with:
              action: 'find-asana-task-id'
              trigger-phrase: ${{ inputs.trigger-phrase }}

        - name: Get permalink to Asana Task
          uses: ./native-github-asana-sync
          id: get-task-permalink
          continue-on-error: true
          with:
              action: 'get-asana-task-permalink'
              asana-pat: ${{ inputs.asana_pat }}
              asana-task-id: ${{ steps.find-asana-task-id.outputs.asanaTaskId }}

        - name: Create Privacy Review task
          uses: ./native-github-asana-sync
          id: create-review-task
          continue-on-error: false
          with:
              asana-pat: ${{ inputs.asana_pat }}
              asana-project: '69071770703008'
              asana-tags: '1208613272217946'
              asana-collaborators: '${{ steps.get-author-asana-id.outputs.asanaUserId }}'
              asana-task-name: 'Privacy Triage: ${{ inputs.team_name }} - ${{ github.event.pull_request.title }}'
              asana-task-description: |
                  PR: ${{ github.event.pull_request.html_url }}/changes?file-filters[]=.json&file-filters[]=.json5
                  Project Task: ${{ steps.get-task-permalink.outputs.asanaTaskPermalink }}
              asana-task-custom-fields: '{"1211720829744228":"1211720829744237"}' # Category:Pixels
              action: 'create-asana-task'

        - name: Add Privacy Review task to PR
          uses: actions/github-script@v7
          with:
              script: |
                  github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: 'Privacy Review task: https://app.asana.com/0/69071770703008/${{steps.create-review-task.outputs.taskId}}'
                  })

        - name: Ping PR author in comment
          uses: ./native-github-asana-sync
          id: ping-pr-author-in-comment
          with:
              asana-pat: ${{ inputs.asana_pat }}
              asana-task-id: ${{ steps.create-review-task.outputs.taskId }}
              asana-task-comment: |
                  <body><a data-asana-gid="${{ steps.get-author-asana-id.outputs.asanaUserId }}"/>, this triage task has been created for <a href="${{ github.event.pull_request.html_url }}/changes?file-filters[]=.json&file-filters[]=.json5">your PR.</a> 
                  Please review the task description, set the Objective and add any context that could help speed up the review process! </body>
              asana-task-comment-is-html: true
              asana-task-comment-pinned: false
              action: 'post-comment-asana-task'

        # Requirements on the github_pat:
        #   - actions: write on duckduckgo/privacy-review-automation
        # E2E-TEST REF: pinned to the in-flight classifier branch with the
        # privacy_triage_task_id input + dual-link Step 5. Revert to 'main'
        # before merging this PR.
        - name: Dispatch AI Privacy Review classifier
          if: ${{ steps.create-review-task.outputs.taskId != '' }}
          uses: actions/github-script@v7
          env:
              PR_URL: ${{ github.event.pull_request.html_url }}
              TRIAGE_TASK_ID: ${{ steps.create-review-task.outputs.taskId }}
          with:
              github-token: ${{ inputs.github_pat }}
              script: |
                  await github.rest.actions.createWorkflowDispatch({
                    owner: 'duckduckgo',
                    repo: 'privacy-review-automation',
                    workflow_id: 'privacy-review-classifier.lock.yml',
                    ref: 'la/triage-id-link',
                    inputs: {
                      pr_url: process.env.PR_URL,
                      privacy_triage_task_id: process.env.TRIAGE_TASK_ID,
                    },
                  });
